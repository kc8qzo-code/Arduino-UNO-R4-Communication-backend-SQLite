spring:
  jackson:
    time-zone: UTC
    deserialization:
      adjust-dates-to-context-time-zone: false
  datasource:
    # Resolved relative to the directory from which the application is started.
    # SQLite creates the database file when it does not already exist.
    url: jdbc:sqlite:./ArduinoTestDB.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
